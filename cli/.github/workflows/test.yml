name: Test & Build

on:
  push:
    branches: [main, feat/*]
    paths: ['cli/**']
  pull_request:
    paths: ['cli/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm test
      - run: npm run build
